services:
  # --- BASE DE DATOS: POSTGRESQL (Optimizado para 435MB RAM) ---
  db:
    image: postgres:16-alpine
    container_name: laravel-db
    restart: unless-stopped
    environment:
      # Variables para inicializar la base de datos
      - POSTGRES_DB=laravel_db
      - POSTGRES_USER=laravel_user
      - POSTGRES_PASSWORD=mi_password_seguro
    command: >
      postgres 
      -c shared_buffers=24MB 
      -c max_connections=10 
      -c work_mem=2MB 
      -c maintenance_work_mem=8MB
      -c autovacuum=off
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - apps-net

  # --- APLICACIÓN: FRANKENPHP (Laravel 12) ---
  app:
    image: dunglas/frankenphp:latest-alpine
    container_name: laravel-app
    restart: unless-stopped
    depends_on:
      - db
    networks:
      - apps-net
      - proxy-net
    volumes:
      - ./:/app
      - caddy_data:/data
      - caddy_config:/config
    environment:
      # --- CONFIGURACIÓN PARA NGINX-PROXY ---
      - VIRTUAL_HOST=tu-dominio.somosdelprieto.com
      - VIRTUAL_PORT=80

      # --- CONFIGURACIÓN CORE DE LARAVEL ---
      - APP_NAME=Laravel
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://tu-dominio.somosdelprieto.com
      - APP_KEY=base64:SsOiYn8eIw/L294qRelrZRDcQvUIlE9XbOeeSExZ9qY=
      
      # --- CONFIGURACIÓN DE BASE DE DATOS (Apunta al servicio 'db') ---
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=laravel_db
      - DB_USERNAME=laravel_user
      - DB_PASSWORD=mi_password_seguro

      # --- OTROS AJUSTES (Drivers ligeros) ---
      - CACHE_STORE=file
      - SESSION_DRIVER=file
      - QUEUE_CONNECTION=sync
      - LOG_CHANNEL=stack
      - LOG_LEVEL=error

      # --- CONFIGURACIÓN FRANKENPHP / CADDY ---
      - SERVER_NAME=:80
      - CADDY_GLOBAL_OPTIONS=local_certs

networks:
  proxy-net:
    external: true
  apps-net:
    external: true

volumes:
  caddy_data:
  caddy_config: